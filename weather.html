<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>India Weather</title>
  <style>
    body { font-family: sans-serif; background:#eef; text-align:center; }
    .cards { display:flex; justify-content:center; gap:20px; margin-top:30px; }
    .card { background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); width:150px; }
    .emoji { font-size:32px; }
  </style>
</head>
<body>
<div id="app">Loading...</div>
<script>
const cities=[{n:"New Delhi",lat:28.61,lon:77.21},{n:"Mumbai",lat:19.07,lon:72.88},{n:"Bengaluru",lat:12.97,lon:77.59}];
const emoji={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌦️",61:"🌧️",71:"❄️",95:"⛈️"};
async function getWeather(c){
  let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&current_weather=true`);
  let d=await r.json();
  return `<div class="card"><h3>${c.n}</h3><div class="emoji">${emoji[d.current_weather.weathercode]||"❓"}</div><p>${d.current_weather.temperature}°C</p></div>`;
}
(async()=>{
  try{
    let res=await Promise.all(cities.map(getWeather));
    app.innerHTML='<div class="cards">'+res.join("")+'</div>';
  }catch(e){app.textContent="Error loading weather";}
})();
</script>
</body>
</html>
